rule_id: R-01
rule_name: 审批签章完整性
applies_to: 立项申请书
intent_keywords: [审批, 签章, 完整性, 形式审查, 材料完整]
description: |
  判断立项申请书的审批签章是否完整。通过的项目需有申请部门意见和科技管理部门意见，
  且两者均有审批日期（格式为"2026年X月X日"）。未签章或日期空白的项目不予通过。
criteria:
  pass:
    - 申请部门/单位意见栏有审批意见文本
    - 科技管理部门意见栏有审批意见文本
    - 两处意见均有具体日期（2026年X月X日格式）
  fail:
    - 审批意见处为空白（仅有"（公章）年 月 日"占位符）
    - 审批日期缺失或为模板占位符
few_shot:
  - excerpt: "申请部门/单位意见：经审核，该项目立项材料完整、技术方案可行、经费预算合理，符合职工技术创新项目立项要求，同意立项申报。2026年03月20日"
    verdict: pass
  - excerpt: "申请部门/单位意见： （公章） 年    月     日"
    verdict: fail
weight: critical
