rule_id: R-03
rule_name: 技术方案实质性
applies_to: 立项申请书
intent_keywords: [创新, 技术方案, 实质性, 技术含量, 创新程度, 可行性]
description: |
  判断立项申请书的技术方案是否具备实质性内容。
  通过的项目需包含具体的技术原理描述和创新点阐述，而非空泛套话。
  评判标准：是否描述了具体的技术方法/算法/装置结构，并能与现有技术明确区分。
criteria:
  pass:
    - "「项目采用的技术原理」章节有分点详述（至少3点）"
    - "「技术关键点及创新点」章节有具体技术细节"
    - "创新点包含具体的方法论（如融合X与Y实现Z）"
  fail:
    - "技术原理章节为空或仅有一句话概述"
    - "创新点为空泛描述（如填补技术空白、提高工作效率）"
    - "仅有封面而无正文内容"
few_shot:
  # ⚠️ 示例仅说明判断逻辑（具体方法论 vs 空泛套话），不是匹配模板
  - excerpt: "1、红外热成像与激光定位融合：装置集成红外热成像模块与激光测距定位模块，在采集设备温度的同时，通过激光测距与惯性姿态解算获取测温点的三维空间坐标。"
    verdict: pass
  - excerpt: "本项目针对变电站智能巡检图像分析技术研究关键技术问题，拟开展核心技术攻关与装置研制，预期形成具有自主知识产权的技术成果。"
    verdict: fail
weight: high
