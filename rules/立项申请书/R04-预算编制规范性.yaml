rule_id: R-04
rule_name: 预算编制规范性
applies_to: 立项申请书
intent_keywords: [预算, 经费, 财务, 合理性, 成本]
description: |
  判断项目经费预算是否分项编制、有具体金额和计算依据。
  通过的项目预算表需包含材料费/测试费/知识产权费等明细科目，
  每个科目有具体金额（万元）和费用构成说明。
criteria:
  pass:
    - 预算表包含至少3个明细科目（材料费/测试化验加工费/知识产权事务费等）
    - 每个科目有具体金额（万元，保留1-3位小数）
    - 备注栏有费用构成与计算依据
    - 总金额与分项合计一致
  fail:
    - 预算表为空或仅有总计而无分项
    - 金额为整数或明显凑整（缺乏计算依据）
    - 总金额与分项合计不一致
few_shot:
  # ⚠️ 示例仅说明判断逻辑（分项明细 vs 笼统大数），不是匹配模板
  - excerpt: "材料费 2.5 用于购置研制该装置1套所需的传感器、控制模块、通信模块、结构件、配套安装材料等费用（含损耗）\n测试化验加工费 4.565 用于研制该装置的机械结构件、电路模块定制加工及第三方测试费用"
    verdict: pass
  - excerpt: "总经费 50.0"
    verdict: fail
weight: high
