rule_id: R-02
rule_name: 承诺书签署完整性
applies_to: 立项申请书
intent_keywords: [承诺书, 签署, 签名, 诚信, 形式审查, 材料完整]
description: |
  判断廉洁及科研诚信承诺书是否由项目负责人正式签署。
  通过的项目承诺书需有项目负责人签名（非空）和签署日期。
  项目负责人签名为空或日期空白的视为形式不完整。
criteria:
  pass:
    - "承诺书末尾「项目负责人」后有具体姓名"
    - "「日期」后有具体日期（通用YYYY年格式，不锁定具体年份）"
  fail:
    - "「项目负责人」后为空"
    - "「日期」后为空白模板"
few_shot:
  # 示例仅说明判断逻辑，不是匹配模板
  - excerpt: >
      项目负责人：林海峰
      日期：[年份]年03月20日
    verdict: pass
  - excerpt: >
      项目负责人：
      日期：  年   月   日
    verdict: fail
weight: conditional
tier: conditional  # B类：申请人可控的完整度硬伤，需regime感知（有槽位才判）
