rule_id: R-07
rule_name: 内容匹配度与实质性
applies_to: 计划任务书
intent_keywords: [内容, 实质, 质量, 创新, 可行, 匹配]
description: |
  判断计划任务书的项目内容是否与申报领域匹配，技术描述是否具备实质性。
  通过的项目需在项目摘要中体现具体的技术方向和攻关内容，
  而非仅用"核心技术攻关""关键技术问题"等模板套话。
  这是综合判断维度——利用LLM的世界知识评估项目是否"真实可行"。
criteria:
  pass:
    - 项目摘要描述了具体的技术方向和预期成果
    - 考核指标（KPI）与项目名称在技术领域上匹配
    - 预算金额与项目规模合理匹配
  fail:
    - 项目摘要仅包含模板套话（"针对XX关键技术问题，拟开展核心技术攻关与装置研制"）
    - 不同项目的KPI完全相同（"装置准确率85%/88%/90%、响应时间500ms/400ms/350ms"）
    - 项目名称与KPI/预算不匹配（如纯软件类项目却有"装置准确率"指标）
few_shot:
  - excerpt: "项目名称：输电线路覆冰预警与智能除冰技术研究 | KPI：装置准确率85%→90%、响应时间500ms→350ms | 预算：45万"
    verdict: pass
  - excerpt: "项目名称：面向配电网的分布式能源优化调度方法研究 | KPI：装置准确率85%→90%、响应时间500ms→350ms | 预算：40万"
    verdict: fail
weight: high
