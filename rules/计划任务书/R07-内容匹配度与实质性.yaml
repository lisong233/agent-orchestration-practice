rule_id: R-07
rule_name: 内容匹配度与实质性
applies_to: 计划任务书
intent_keywords: [内容, 实质, 质量, 创新, 可行, 匹配]
description: |
  判断计划任务书的项目内容是否具备实质性，考核指标与项目类型是否自洽。

  方法论（v3）：正则检查结构异常（KPI自我重复/模板复制），LLM判断语义质量。
  正则不匹配任何具体数值、年份或项目名——这些是训练集指纹，在隐藏集上无效。
criteria:
  pass:
    - 项目摘要描述了具体技术方向和攻关路径（而非模板套话）
    - 考核指标（KPI）在领域上与项目名称自洽（软件项目不应有硬件装置KPI）
    - 预算金额与项目规模合理匹配
    - 不同考核指标有差异化取值（非全表复制粘贴）
  fail:
    - 项目摘要仅含模板套话（"针对XX关键技术问题，拟开展核心技术攻关"——无具体方向）
    - 多个KPI指标取值完全相同（疑似模板批量填充，非真实规划）
    - 项目名称与KPI领域明显不匹配（需LLM用电力领域知识判断）
    - 预算仅笼统大数，无分项明细和计算依据
few_shot:
  # ⚠️ 以下为虚构示例，仅说明判断逻辑，不是匹配模板。训练集样本一律不出现在此处。
  - excerpt: "项目名称：[某硬件研发项目] | 考核指标：装置识别准确率≥92%、响应时间≤200ms、功耗≤15W | 预算：材料费25万+测试费12万+知识产权3万"
    verdict: pass
  - excerpt: "项目名称：[某软件算法项目] | 考核指标：装置准确率≥90%、响应时间≤300ms | 预算：总经费40万"
    verdict: fail
    note: "软件/算法项目不应有硬件装置类KPI——这是领域常识，不是匹配训练集"
weight: high
