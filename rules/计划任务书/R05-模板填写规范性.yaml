rule_id: R-05
rule_name: 模板填写规范性
applies_to: 计划任务书
intent_keywords: [模板, 格式, 规范性, 形式审查, 材料完整, 填写]
description: |
  判断计划任务书是否按规范填写完毕，无模板说明文字残留。
  正式提交的文档不应保留"【填写说明：请在此处填写项目相关内容，删除本提示】"
  等模板提示语。出现此类残留表明文档尚未完成填写。
criteria:
  pass:
    - 文档各处均为正式内容，无模板引导文字
    - 所有表格字段均有对应内容
  fail:
    - 文档中出现"【填写说明】""删除本提示"等模板提示语
    - 出现"请在此处填写"等未完成的引导文字
few_shot:
  # 示例仅说明判断逻辑，不是匹配模板
  - excerpt: "项目负责人：陈志远\n日期：[年份]年03月20日"
    verdict: pass
  - excerpt: "【填写说明：请在此处填写项目相关内容，删除本提示】"
    verdict: fail
weight: critical
