rule_id: R-06
rule_name: 团队信息真实性
applies_to: 计划任务书
intent_keywords: [团队, 人员, 真实性, 人力, 组织]
description: |
  判断项目团队信息是否真实有效。
  关键信号：编号占位符（"成员10""成员11"等）表明人员未确定，
  属于模板填充。团队人数应与项目规模匹配，过度膨胀（>15人）为异常。
  注：姓氏占位符（"刘工""王工"等）在通过和不通过文档中均有出现，
  不作为独立判断依据。
criteria:
  pass:
    - 团队成员无"成员N"格式的编号占位符
    - 团队规模与项目内容匹配（一般不超过15人）
  fail:
    - 出现"成员10""成员11"等编号占位符（表明模板未填完）
    - 团队规模异常膨胀（≥15人且大量重复分工）
few_shot:
  # ⚠️ 示例仅说明判断逻辑（真实姓名 vs 编号占位符），不是匹配模板
  - excerpt: "| 1 | 陈志远 | 40 | 高级工程师 | 专责 | 项目负责人，负责项目总体策划、组织协调与验收 |\n| 2 | 刘工 | 35 | 工程师 | 技术员 | 负责装置研制与测试 |"
    verdict: pass
  - excerpt: "| 10 | 成员10 | 30 | 工程师 | 班员 | 参与数据采集与整理 |\n| 11 | 成员11 | 30 | 工程师 | 班员 | 参与现场测试与验证 |\n...\n| 21 | 成员21 | 30 | 工程师 | 班员 | 参与协调联络 |"
    verdict: fail
weight: critical
